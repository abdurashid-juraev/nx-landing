<header class="bg-white shadow-lg px-4 py-2 rounded-lg">
  <section class="flex items-center justify-between">
    <button
      type="button"
      class="size-9 duration-150 hover:bg-slate-100 rounded-md grid place-items-center"
    >
      <i class="pi pi-angle-left text-2xl"></i>
    </button>
    <nav class="flex items-center gap-4">
      <button
        type="button"
        class="size-10 grid place-items-center hover:bg-slate-100 rounded-full duration-150"
      >
        <i class="pi pi-cog text-2xl"></i>
      </button>
      <p-overlaybadge
        value="1"
        class="cursor-pointer duration-150 hover:bg-slate-100 rounded-full size-10 grid place-items-center"
      >
        <i class="pi pi-bell text-2xl"></i>
      </p-overlaybadge>
      <article>
        <p-avatar icon="pi pi-user" size="large" shape="circle" class="cursor-pointer" />
      </article>
    </nav>
  </section>
</header>
